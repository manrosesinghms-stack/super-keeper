/* ================= SUPER KEEPER v2 =================
   Reaction goalkeeper roguelike. Mouse = glove. Click = dive.
   v2: full art pass — floodlit dusk stadium, living crowd,
   hit-stop, golden balls, grades, duck. Juice everywhere.
==================================================== */

const W=960,H=600;
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
function fit(){const s=Math.min(innerWidth/W,innerHeight/H);cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';}
addEventListener('resize',fit);fit();

/* ---------- geometry ---------- */
const GX0=200,GX1=760,GY0=150,GY1=425;
const GCX=(GX0+GX1)/2, GCY=(GY0+GY1)/2;
const BALL_START={x:480,y:555};

/* ---------- utils ---------- */
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function wrap(txt,x,y,maxW,lh){const words=txt.split(' ');let line='',yy=y;for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,yy);line=w;yy+=lh;}else line=t;}if(line)ctx.fillText(line,x,yy);return yy;}
function drawHeart(x,y,s,col,stroke){
  ctx.beginPath();ctx.moveTo(x,y+s*.32);
  ctx.bezierCurveTo(x,y,x-s*.55,y,x-s*.55,y+s*.32);
  ctx.bezierCurveTo(x-s*.55,y+s*.6,x,y+s*.78,x,y+s*.95);
  ctx.bezierCurveTo(x,y+s*.78,x+s*.55,y+s*.6,x+s*.55,y+s*.32);
  ctx.bezierCurveTo(x+s*.55,y,x,y,x,y+s*.32);
  ctx.fillStyle=col;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
}

/* ---------- CrazyGames SDK (guarded) ---------- */
let SDKOK=false;
addEventListener('load',async()=>{try{if(window.CrazyGames&&window.CrazyGames.SDK){await window.CrazyGames.SDK.init();SDKOK=true;}}catch(e){}});

/* ---------- audio (synth, lazy) ---------- */
let AC=null,crowdG=null,crowdBase=.03,SFXG=null,MUSG=null;
let MUTE=+(localStorage.getItem('sk_mute')||0); // 0=all on, 1=music off, 2=all off
function applyMute(){try{if(SFXG)SFXG.gain.value=MUTE===2?0:1;if(MUSG)MUSG.gain.value=MUTE>=1?0:.9;}catch(e){}}
function audioInit(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    SFXG=AC.createGain();SFXG.connect(AC.destination);
    MUSG=AC.createGain();MUSG.connect(AC.destination);
    const len=2*AC.sampleRate,buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
    const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
    const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=420;
    crowdG=AC.createGain();crowdG.gain.value=crowdBase;
    src.connect(f);f.connect(crowdG);crowdG.connect(SFXG);src.start();
    applyMute();
  }catch(e){AC=null;}
}
function tone(freq,dur,type,vol,slide){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,slide),AC.currentTime+dur);
    g.gain.value=vol||.15;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
    o.connect(g);g.connect(SFXG||AC.destination);o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
function noiseHit(f0,dur,vol){
  if(!AC)return;
  try{
    const len=Math.max(1,dur*AC.sampleRate|0),buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
    const s=AC.createBufferSource();s.buffer=buf;
    const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=f0;
    const g=AC.createGain();g.gain.value=vol||.3;
    s.connect(f);f.connect(g);g.connect(SFXG||AC.destination);s.start();
  }catch(e){}
}
/* ---------- music: 16-step A-minor groove, scheduled on the audio clock ---------- */
const mf=m=>440*Math.pow(2,(m-69)/12);
const MBASS=[45,0,45,0,48,0,43,0,45,0,45,0,50,0,48,43];
const ARP=[69,72,76,79,76,72,81,79];
let mNext=0,mStep=0;
function musNote(freq,t,dur,type,vol,slideTo){
  if(!AC||!MUSG)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,t);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(Math.max(25,slideTo),t+dur);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g);g.connect(MUSG);o.start(t);o.stop(t+dur+.02);
  }catch(e){}
}
function musicTick(){
  if(!AC||MUTE>=1||AC.state!=='running')return;
  const spb=.268;
  if(mNext<AC.currentTime-1)mNext=AC.currentTime+.05; // resync after suspend
  while(mNext<AC.currentTime+.25){
    const s=mStep,t=mNext;
    const inPlay=(S.mode==='play'||S.mode==='penalty')&&!S.paused;
    const b=MBASS[s];if(b)musNote(mf(b),t,.24,'triangle',inPlay?.14:.09);
    if(inPlay&&s%4===0)musNote(120,t,.11,'sine',.42,45);           // kick
    if(inPlay&&s%2===1)musNote(6200,t,.03,'square',.025);          // hat
    if(s%2===0)musNote(mf(ARP[(s/2)%ARP.length]),t,.2,'triangle',inPlay?.045:.065);
    mStep=(mStep+1)%16;mNext+=spb;
  }
}
function roar(k){ // crowd swells
  if(!AC||!crowdG)return;
  try{
    const t=AC.currentTime;
    crowdG.gain.cancelScheduledValues(t);
    crowdG.gain.setValueAtTime(crowdG.gain.value,t);
    crowdG.gain.linearRampToValueAtTime(Math.min(.34,.12+k*.22),t+.12);
    crowdG.gain.exponentialRampToValueAtTime(Math.max(.015,crowdBase),t+1.4);
  }catch(e){}
}
const sWhistle=()=>{tone(2200,.09,'square',.07);setTimeout(()=>tone(2200,.22,'square',.07),140);};
const sKick   =()=>{tone(95,.14,'sine',.5,40);noiseHit(300,.06,.15);};
const sSave   =()=>{noiseHit(1400,.12,.5);tone(500,.08,'triangle',.25,700);};
const sGoal   =()=>{tone(300,.35,'sawtooth',.12,240);tone(260,.5,'sawtooth',.12,180);tone(220,.6,'sawtooth',.1,150);};
const sPickUI =()=>{tone(700,.07,'triangle',.15,900);};
const sFanfare=()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.25,'triangle',.2),i*110));};
const sClang  =()=>{tone(1100,.14,'square',.28,180);noiseHit(2400,.09,.22);};
const sBeat   =()=>{tone(58,.12,'sine',.45,42);};
const sQuack  =()=>{tone(340,.09,'sawtooth',.18,220);setTimeout(()=>tone(300,.1,'sawtooth',.16,190),120);};

/* ---------- pointer ---------- */
const PT={x:W/2,y:GCY};
function toXY(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};}
cv.addEventListener('pointermove',e=>{const p=toXY(e);PT.x=p.x;PT.y=p.y;});
cv.addEventListener('pointerdown',e=>{const p=toXY(e);PT.x=p.x;PT.y=p.y;audioInit();onDown();e.preventDefault();},{passive:false});
cv.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    if(AC)try{AC.suspend();}catch(e){}
    if(S.mode==='play'||S.mode==='penalty')S.paused=true; // don't lose runs to tab switches
  }else if(AC)try{AC.resume();}catch(e){}
});
addEventListener('keydown',e=>{
  if((e.key==='p'||e.key==='P'||e.key==='Escape')&&(S.mode==='play'||S.mode==='penalty'))S.paused=!S.paused;
});

/* ---------- data ---------- */
const NATIONS=[
  {n:'NORVIA',    c:['#1d4ed8','#e2e8f0'],chant:'ROW! ROW! ROW!'},
  {n:'QUACKLAND', c:['#facc15','#16a34a'],chant:'QUACK QUACK!'},
  {n:'SAMBIA',    c:['#16a34a','#fde047'],chant:'OLE OLE OLE!'},
  {n:'EL TORO',   c:['#dc2626','#f59e0b'],chant:'TORO! TORO!'},
  {n:'ICEGARD',   c:['#22d3ee','#f8fafc'],chant:'FREEZE THEM!'},
  {n:'KANGARIA',  c:['#15803d','#fbbf24'],chant:'HOP HOP HOP!'},
  {n:'CASOVIA',   c:['#ef4444','#f1f5f9'],chant:'CA-SO-VI-A!'},
  {n:'DRACOSTAN', c:['#7c3aed','#0f172a'],chant:'BURN IT DOWN!'},
  {n:'SOLARIA',   c:['#fb923c','#fef3c7'],chant:'SUN NEVER SETS!'},
  {n:'GALAXY XI', c:['#8b5cf6','#22d3ee'],chant:'NOT FROM EARTH!'},
];
const MUTS=[
  {id:'gloves',t:'GIANT GLOVES', d:'Your gloves grow 30% bigger.',k:'buff', ic:'🧤',f:()=>{S.gloveR+=10;}},
  {id:'cat',   t:'CAT REFLEXES', d:'Close calls slow time down much more.',k:'buff', ic:'🐱',f:()=>{S.catLv++;}},

  {id:'heart', t:'EXTRA HEART',  d:'+1 life. You will need it.',k:'buff', ic:'❤',f:()=>{S.hp=Math.min(5,S.hp+1);}},
  {id:'magnet',t:'MAGNET PALMS', d:'Nearby shots bend into your glove.',k:'buff', ic:'🧲',f:()=>{S.magnet=true;}},
  {id:'rocket',t:'ROCKET SHOTS', d:'All shots fly 30% faster.',k:'chaos',ic:'🚀',f:()=>{S.rocket=true;}},

  {id:'bender',t:'FULL BENDER',  d:'Every single shot curves. Hard.',k:'chaos',ic:'🌀',f:()=>{S.bender=true;}},
  {id:'night', t:'FLOODLIGHT FAILURE',d:'Stadium goes dark. Spotlights only.',k:'chaos',ic:'💡',f:()=>{S.night=true;}},
];
const SAVE_TXT=['SAVED!','DENIED!','NOT TODAY!','WHAT A WALL!','NOPE!','SHUT THE DOOR!'];
const SUPER_TXT=['SUPERSAVE!!','UNREAL!!','WORLD CLASS!!','IMPOSSIBLE!!','ARE YOU HUMAN?!'];
const GOAL_TXT=['BEATEN...','GOAL AGAINST','OUCH.','SO CLOSE!','PICK IT OUT...'];
const GRADES=[
  {min:8,l:'S',t:'THE GREAT WALL',c:'#facc15'},
  {min:6,l:'A',t:'WORLD CLASS',c:'#4ade80'},
  {min:4,l:'B',t:'SAFE HANDS',c:'#22d3ee'},
  {min:2,l:'C',t:'WEEKEND WARRIOR',c:'#e2e8f0'},
  {min:0,l:'D',t:'SWISS CHEESE',c:'#f87171'},
];

/* ---------- precomputed scenery ---------- */
const STARS=[];for(let i=0;i<70;i++)STARS.push({x:rnd(0,W),y:rnd(2,44),s:rnd(.6,1.8),ph:rnd(0,7)});
const CROWD=[];
for(let i=0;i<230;i++)CROWD.push({x:rnd(46,914),y:rnd(52,84),ph:rnd(0,7),c:'',tier:0});
for(let i=0;i<260;i++)CROWD.push({x:rnd(42,918),y:rnd(94,128),ph:rnd(0,7),c:'',tier:1});
const FLAGS=[];for(let i=0;i<13;i++)FLAGS.push({x:rnd(70,890),y:rnd(52,120),ph:rnd(0,7),c:''});
function paintCrowd(nat){
  for(const p of CROWD)p.c=Math.random()<.42?nat.c[0]:Math.random()<.5?nat.c[1]:pick(['#94a3b8','#64748b','#e2b07f','#475569']);
  for(const f of FLAGS)f.c=Math.random()<.5?nat.c[0]:nat.c[1];
}

/* ---------- state ---------- */
let S=null;
function baseState(){
  return {
    mode:'title', gameMode:'solo', paused:false, t:0, ts:1, debugTs:1,
    shake:0, flash:0, flashCol:'255,60,60', freeze:0, punch:0, punchX:GCX, punchY:GCY,
    god:false, autopick:false,
    score:0, dispScore:0, mult:1, hp:3, streak:0, saves:0, conceded:0, matchIdx:0,
    gloveR:34, catLv:0, sense:false, magnet:false,
    rocket:false, twin:false, ghost:false, bender:false, night:false,
    chaos:0, taken:{},
    nation:NATIONS[0], shotsTotal:5, shotIdx:0, matchConceded:0,
    sub:'intro', subT:0, volley:null,
    glove:{x:GCX,y:GCY}, gloveTrail:[], dive:0, diveCd:0, keeperFlop:0, flopDir:1, saveGrin:0,
    parts:[], pops:[], ripples:[], deadBalls:[], fireworks:[],
    hype:.3, hint:null, cards:null, pen:null, overLock:0, overT:0, grade:null, R:null, royaleResult:null, D:null, duelResult:null,
    wave:{on:false,x:0,shown:false}, duck:{t:-1,x:-60,quacked:false}, postShake:0,
    chantT:6, hbT:0, hbPulse:0,
    best:+(localStorage.getItem('sk_best')||0),
  };
}
S=baseState();

/* ---------- fx helpers ---------- */
function pop(x,y,txt,col,size){S.pops.push({x,y,txt,col:col||'#fff',size:size||30,t:0});}
function burst(x,y,n,cols,pw){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),v=rnd(60,pw||420);S.parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-80,life:rnd(.4,.9),t:0,c:pick(cols),s:rnd(2,6),g:600});}}
function confetti(){for(let i=0;i<160;i++)S.parts.push({x:rnd(0,W),y:rnd(-80,0),vx:rnd(-40,40),vy:rnd(60,220),life:rnd(1.4,2.6),t:0,c:pick(['#f43f5e','#22d3ee','#facc15','#4ade80','#a78bfa']),s:rnd(3,7),g:30});}
function fireworksShow(){for(let i=0;i<3;i++)S.fireworks.push({x:rnd(180,780),y:rnd(50,120),delay:.25+i*.4});}
function deadBall(x,y,dirX,gold,big){
  S.deadBalls.push({x,y,vx:dirX*rnd(220,480),vy:-rnd(140,340),r:big||11,rot:rnd(0,6),vr:rnd(-9,9),t:0,life:1.2,gold:!!gold});
}
function grassKick(x,y){for(let i=0;i<10;i++)S.parts.push({x,y,vx:rnd(-140,140),vy:-rnd(60,260),life:rnd(.3,.6),t:0,c:pick(['#166534','#14532d','#a16207']),s:rnd(2,4),g:900});}

/* ---------- run flow ---------- */
function startRun(){
  S=Object.assign(baseState(),{mode:'play',god:S.god,autopick:S.autopick,debugTs:S.debugTs});
  startMatch(1); sdkStart();
}
function startMatch(i){
  S.matchIdx=i;
  const nat=NATIONS[(i-1)%NATIONS.length];
  S.nation=(i>NATIONS.length)?Object.assign({},nat,{n:nat.n+' II'}):nat;
  paintCrowd(S.nation);
  S.shotsTotal=Math.min(9,4+Math.ceil(i/2));
  S.shotIdx=0;S.matchConceded=0;S.sub='intro';S.subT=0;S.volley=null;
  if(S.nation.n.startsWith('QUACKLAND')||Math.random()<.22){S.duck.t=0;S.duck.x=-60;S.duck.quacked=false;}
  sWhistle();
}
function flightTime(){let ft=Math.max(.34,.62-.022*(S.matchIdx-1));if(S.rocket)ft*=.75;return ft;}
function makeBall(delay,fromX){
  const m=S.matchIdx;
  const missRoll=Math.random();
  const miss=missRoll<Math.max(.03,.10-.006*m);
  const post=miss&&Math.random()<.45;
  let tx=rnd(GX0+35,GX1-35),ty=rnd(GY0+30,GY1-25);
  if(Math.random()<.55){tx=Math.random()<.5?rnd(GX0+30,GX0+120):rnd(GX1-120,GX1-30);}
  if(miss){
    if(post){ if(Math.random()<.7){tx=Math.random()<.5?GX0:GX1;ty=rnd(GY0+20,GY1-20);} else {ty=GY0;tx=rnd(GX0+40,GX1-40);} }
    else {tx=Math.random()<.5?rnd(GX0-90,GX0-30):rnd(GX1+30,GX1+90);ty=rnd(GY0-40,GY1);}
  }
  const curveOn=S.bender||Math.random()<Math.min(.55,.10+.05*m);
  const curve=curveOn?rnd(40,Math.min(150,40+8*m))*(Math.random()<.5?-1:1)*(S.bender?1.5:1):0;
  const feint=!miss&&Math.random()<Math.min(.45,.04*m);
  const gold=!miss&&m>=2&&Math.random()<.07;
  return {delay,t:-1,ft:flightTime(),from:{x:fromX,y:BALL_START.y},
    tgt:{x:tx,y:ty},tgt2:feint?{x:clamp(tx+rnd(-160,160),GX0+30,GX1-30),y:clamp(ty+rnd(-80,80),GY0+25,GY1-20)}:null,
    curve,miss,post,gold,resolved:false,saved:false,rot:rnd(0,6),trail:[],goldPop:false};
}
function nextVolley(){
  S.shotIdx++;
  const balls=[makeBall(0,BALL_START.x)];
  if(S.twin)balls.push(makeBall(.35,Math.random()<.5?300:660));
  S.volley={prep:Math.max(.55,.95-.03*S.matchIdx),balls,launched:false,resolvedT:0};
  S.sub='volley';S.subT=0;S.hint=null;
}
function resolveBall(b){
  b.resolved=true;
  const end=b.tgt2&&!b.miss? b.tgt2 : b.tgt;
  if(b.miss){
    if(b.post){
      pop(end.x,clamp(end.y,80,560),'CLANG!','#fbbf24',34);
      S.score+=40;S.postShake=1;S.shake=Math.max(S.shake,7);S.freeze=Math.max(S.freeze,.05);
      deadBall(end.x,end.y,end.x<GCX?-1:1,b.gold,13);sClang();
    }else{
      pop(end.x,clamp(end.y,80,560),'WIDE!','#94a3b8',26);S.score+=25;
    }
    return;
  }
  const reach=S.gloveR+8+(S.dive>0?20:0);
  const d=dist(S.glove,end);
  if(S.god||d<reach){
    b.saved=true;S.saves++;S.streak++;S.hype=Math.min(1,S.hype+.22);
    const isSuper=S.dive>0||d>reach*.7;
    const finger=!S.god&&d>reach*.85;
    S.mult=1+.5*S.chaos+.1*Math.min(S.streak,10);
    let pts=Math.round((isSuper?250:100)*S.mult);
    if(b.gold)pts*=3;
    S.score+=pts;
    pop(end.x,end.y-30,b.gold?'GOLDEN SAVE!!':pick(isSuper?SUPER_TXT:SAVE_TXT),b.gold?'#facc15':isSuper?'#facc15':'#4ade80',b.gold?42:isSuper?40:32);
    pop(end.x,end.y+14,'+'+pts,b.gold?'#fde047':'#e2e8f0',b.gold?26:20);
    if(finger){S.score+=50;pop(end.x,end.y+44,'FINGERTIPS! +50','#22d3ee',18);}
    if(S.gameMode==='royale'&&S.R)S.R.players[0].pts+=pts+(finger?50:0);

const R_SHOTS=[5,5,6,7], R_DIFF=[2,4,6,8];

function startRoyale(){

function royaleElim(){

/* ---------- DUEL CUP (1v1 shootout ladder — the Stage-2 netcode-ready loop) ---------- */
const DUEL_STAGES=['QUARTER-FINAL','SEMI-FINAL','THE FINAL'];
const TAUNTS=['too easy.','my grandma dives better.','watch and learn.','is that all?','I eat penalties.'];
function startDuel(){

function startDuelMatch(){

function duelRival(){return S.D.rivals[S.D.stage];}
function duelDefend(){

function duelAfterDefend(){

function takeAimedShot(err){

  const e=err!=null?err:Math.max(40,160-8*S.matchIdx);

  S.pen.guess={x:clamp(tx+rnd(-e,e),GX0+40,GX1-40),y:clamp(ty+rnd(-e*.6,e*.6),GY0+30,GY1-20)};

}
function duelShoot(){

    info:'Round '+D.round+(D.sudden?' — SUDDEN DEATH':' of 5')};

function updateDuelShot(dt){

  if(P.phase==='aim'){

    P.shot.t+=dt/.5;
    if(P.shot.t>=1){
      const saved=dist(P.guess,P.shot.tgt)<75;

function duelAfterShoot(saved){

function duelDecide(){

function cardAt(x,y){for(let i=0;i<3;i++){const cx=80+i*280;if(x>=cx&&x<=cx+240&&y>=150&&y<=450)return i;}return null;}

/* ---------- update ---------- */
function update(dt){
  if(S.paused)return;
  S.t+=dt;
  S.shake=Math.max(0,S.shake-dt*30);
  S.flash=Math.max(0,S.flash-dt*1.6);
  S.punch=Math.max(0,S.punch-dt*5);
  S.postShake=Math.max(0,S.postShake-dt*3);
  S.hype=Math.max(.25,S.hype-dt*.05);
  S.overLock=Math.max(0,S.overLock-dt);
  S.saveGrin=Math.max(0,S.saveGrin-dt*1.6);
  S.hbPulse=Math.max(0,S.hbPulse-dt*3);
  if(S.mode==='over')S.overT+=dt;
  if(crowdG&&AC){crowdBase=.02+S.hype*.09;}
  // hit-stop: freeze the world, still tick the timer
  if(S.freeze>0){S.freeze-=dt;return;}
  // fx
  for(const p of S.parts){p.t+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.g*dt;}
  S.parts=S.parts.filter(p=>p.t<p.life);
  for(const p of S.pops)p.t+=dt;
  S.pops=S.pops.filter(p=>p.t<1.4);
  for(const r of S.ripples)r.t+=dt;
  S.ripples=S.ripples.filter(r=>r.t<1);
  for(const b of S.deadBalls){b.t+=dt;b.x+=b.vx*dt;b.y+=b.vy*dt;b.vy+=900*dt;b.rot+=b.vr*dt;b.r+=dt*8;}
  S.deadBalls=S.deadBalls.filter(b=>b.t<b.life);
  for(const f of S.fireworks){f.delay-=dt;if(f.delay<=0){burst(f.x,f.y,40,['#facc15','#f43f5e','#22d3ee','#4ade80','#fff'],380);S.flash=Math.max(S.flash,.18);S.flashCol='255,240,200';tone(rnd(600,900),.2,'triangle',.15,200);}}
  S.fireworks=S.fireworks.filter(f=>f.delay>0);
  // duck cameo
  if(S.duck.t>=0){
    S.duck.t+=dt;S.duck.x=-60+S.duck.t*95;
    if(!S.duck.quacked&&S.duck.x>GCX-30){S.duck.quacked=true;pop(S.duck.x,505,'QUACK.','#facc15',20);sQuack();}
    if(S.duck.x>W+60)S.duck.t=-1;
  }
  // stadium wave
  if(S.streak>=8&&(S.mode==='play')){
    if(!S.wave.on){S.wave.on=true;S.wave.x=0;if(!S.wave.shown){S.wave.shown=true;pop(GCX,110,'STADIUM WAVE! 🌊','#22d3ee',28);roar(.8);}}
  }
  if(S.wave.on){S.wave.x+=dt*420;if(S.wave.x>W+200)S.wave.x=-200;}
  // chants
  if(S.mode==='play'&&S.hype>.5){S.chantT-=dt;if(S.chantT<=0){S.chantT=rnd(6,10);pop(rnd(240,720),rnd(60,116),S.nation.chant,'rgba(255,255,255,.75)',16);[0,140,280].forEach((d,i)=>setTimeout(()=>tone(240+i*40,.09,'square',.05),d));}}
  // heartbeat at 1 HP
  if(S.mode==='play'&&S.hp===1){S.hbT-=dt;if(S.hbT<=0){S.hbT=.85;sBeat();S.hbPulse=1;}}

  if(S.mode==='play')updatePlay(dt);
  else if(S.mode==='pick'&&S.autopick){S.subT+=dt;if(S.subT>.4)applyMut(pick(S.cards));}
  else if(S.mode==='penalty')updatePenalty(dt);
}
function gloveTarget(){
  if(S.god&&S.volley){
    const b=S.volley.balls.find(b=>!b.resolved&&!b.miss);
    if(b)return b.tgt2&&!b.miss?b.tgt2:b.tgt;
  }
  return {x:clamp(PT.x,GX0-20,GX1+20),y:clamp(PT.y,GY0-10,GY1+15)};
}
function updateKeeper(dt){
  S.dive=Math.max(0,S.dive-dt);
  S.diveCd=Math.max(0,S.diveCd-dt);
  const tgt=gloveTarget();
  let spd=1500;
  if(S.dive>0)spd=3400;else if(S.diveCd>.35)spd=600;
  if(S.god)spd=99999;
  const dx=tgt.x-S.glove.x,dy=tgt.y-S.glove.y,d=Math.hypot(dx,dy);
  if(d>1){const step=Math.min(d,spd*dt);S.glove.x+=dx/d*step;S.glove.y+=dy/d*step;}
  S.gloveTrail.push({x:S.glove.x,y:S.glove.y});
  if(S.gloveTrail.length>7)S.gloveTrail.shift();
}
function ballPos(b){
  const t=clamp(b.t,0,1);
  const end=b.tgt2&&t>.45?b.tgt2:b.tgt;
  let ex=end.x,ey=end.y;
  if(b.tgt2&&t>.45&&t<.7){const k=(t-.45)/.25;ex=lerp(b.tgt.x,b.tgt2.x,k);ey=lerp(b.tgt.y,b.tgt2.y,k);}
  let x=lerp(b.from.x,ex,t)+Math.sin(t*Math.PI)*b.curve;
  let y=lerp(b.from.y,ey,t)-Math.sin(t*Math.PI)*46;
  return {x,y,r:lerp(20,11,t)};
}
function updatePlay(dt){
  updateKeeper(dt);
  S.subT+=dt;
  if(S.sub==='intro'){if(S.subT>1.3){if(S.gameMode==='duel')duelDefend();else nextVolley();}return;}
  if(S.sub==='intro2'){if(S.subT>.8)duelDefend();return;}
  if(S.sub==='dshoot'){updateDuelShot(dt);return;}
  if(S.sub==='matchend'){if(S.subT>1.5)afterMatch();return;}
  if(S.sub==='relim'){if(S.autopick&&S.subT>.5)advanceRelim();return;}
  if(S.sub==='dead')return;
  if(S.sub!=='volley'||!S.volley)return;
  const V=S.volley;
  if(V.prep>0){
    V.prep-=dt;
    if(!V.tick&&V.prep<.3){V.tick=true;tone(1300,.04,'square',.05);}
    if(V.prep<=0){V.balls.forEach(b=>{b.t=-b.delay/b.ft;});sKick();V.launched=true;}
    return;
  }
  let allDone=true,slow=false;
  for(const b of V.balls){
    if(b.resolved)continue;
    allDone=false;
    b.t+=dt/b.ft;
    if(b.t<0)continue;
    if(b.gold&&!b.goldPop){b.goldPop=true;pop(b.from.x,b.from.y-70,'GOLDEN BALL! x3','#facc15',26);tone(1568,.35,'triangle',.12,2093);}
    const p=ballPos(b);
    b.trail.push({x:p.x,y:p.y,r:p.r});if(b.trail.length>9)b.trail.shift();
    b.rot+=dt*12;
    if(b.gold&&Math.random()<.5)S.parts.push({x:p.x+rnd(-8,8),y:p.y+rnd(-8,8),vx:rnd(-30,30),vy:rnd(-30,30),life:.4,t:0,c:pick(['#facc15','#fde047']),s:2.5,g:0});
    if(S.sense&&b.t>0&&b.t<.16&&!b.miss)S.hint={x:(b.tgt2||b.tgt).x,y:(b.tgt2||b.tgt).y,t:S.t};
    if(S.magnet&&b.t>.7&&!b.miss){
      const end=b.tgt2||b.tgt;
      if(dist(S.glove,end)<95){const k=Math.min(1,dt*3.2);end.x=lerp(end.x,S.glove.x,k);end.y=lerp(end.y,S.glove.y,k);}
    }
    const remain=(1-b.t)*b.ft;
    if(remain<(.12+S.catLv*.06)&&!b.miss){
      const end=b.tgt2||b.tgt;
      if(dist(S.glove,end)<(S.gloveR+8)*2.4)slow=true;
    }
    if(b.t>=1)resolveBall(b);
  }
  S.ts=lerp(S.ts,slow?(S.catLv>0?.22:.35):1,Math.min(1,dt*14));
  if(allDone){V.resolvedT+=dt;if(V.resolvedT>.65){S.sub='between';S.subT=0;endVolley();}}
}
function updatePenalty(dt){
  const P=S.pen;P.t+=dt;
  if(P.phase==='aim'){
    P.ret.x=GCX+Math.sin(P.t*2.1)*250;
    P.ret.y=GCY+Math.sin(P.t*3.3)*105;
    if(S.autopick&&P.t>1)onDown();
  }else if(P.phase==='shot'){
    P.shot.t+=dt/.5;
    if(P.shot.t>=1){
      const saved=dist(P.guess,P.shot.tgt)<75;
      P.result=saved?'SAVED BY THEIR KEEPER':'GOOOAL! +1 HEART +300';
      if(!saved){S.hp=Math.min(5,S.hp+1);S.score+=300;confetti();sFanfare();roar(1);}

    }

}

const OV=document.createElement('canvas');OV.width=W;OV.height=H;const ovx=OV.getContext('2d');

function draw(){

  // display score eases toward real score
  S.dispScore+=(S.score-S.dispScore)*.12;
  if(Math.abs(S.score-S.dispScore)<1)S.dispScore=S.score;
  ctx.save();
  if(S.shake>0)ctx.translate(rnd(-S.shake,S.shake),rnd(-S.shake,S.shake));
  if(S.punch>0){const s=1+S.punch*.045;ctx.translate(S.punchX,S.punchY);ctx.scale(s,s);ctx.translate(-S.punchX,-S.punchY);}
  drawStadium();
  if(S.mode==='title')drawTitle();
  else if(S.mode==='over'){drawGoal();drawOver();}
  else{
    if(S.mode==='play'||S.mode==='penalty'){
      drawGoal();
      if(S.mode==='play'&&S.sub==='dshoot')drawPenalty();
      else if(S.mode==='play'){drawShooter();drawKeeper();drawBalls();drawHint();}
      else drawPenalty();
    }
    drawDuck();
    drawFx();
    if(S.mode==='pick')drawPick();

    if(S.mode==='play'&&S.sub==='intro')drawIntro();
    if(S.mode==='play'&&S.sub==='relim')drawRelim();
  }
  if(S.night&&(S.mode==='play'||S.mode==='penalty')){
    ovx.clearRect(0,0,W,H);

    if(S.volley)for(const b of S.volley.balls)if(!b.resolved&&b.t>0){const p=ballPos(b);holes.push({x:p.x,y:p.y,r:120});}
    for(const h of holes){const g=ovx.createRadialGradient(h.x,h.y,10,h.x,h.y,h.r);g.addColorStop(0,'rgba(0,0,0,1)');g.addColorStop(1,'rgba(0,0,0,0)');ovx.fillStyle=g;ovx.beginPath();ovx.arc(h.x,h.y,h.r,0,7);ovx.fill();}

  if(S.hbPulse>0){ctx.strokeStyle=`rgba(248,113,113,${S.hbPulse*.5})`;ctx.lineWidth=14;ctx.strokeRect(7,7,W-14,H-14);}
  ctx.restore();

    ctx.fillStyle='rgba(2,6,16,.78)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#f8fafc';ctx.font='italic bold 54px Arial';ctx.fillText('PAUSED',GCX,285);
    ctx.fillStyle='#94a3b8';ctx.font='18px Arial';ctx.fillText('CLICK TO RESUME  •  P / ESC',GCX,325);
  }

  ctx.globalAlpha=Math.hypot(PT.x-(W-30),PT.y-(H-26))<20?1:.55;
  ctx.font='20px Arial';ctx.textAlign='center';
  ctx.fillStyle='#e2e8f0';ctx.fillText(['🔊','🔈','🔇'][MUTE],W-30,H-18);

function drawGoal(){

    ctx.beginPath();ctx.moveTo(GX1+ps,GY0+i*(GY1-GY0)/5);ctx.lineTo(GX1+26+ps,GY0-18+i*(GY1-GY0+8)/5);ctx.stroke();

      const px=x+(GCX-x)*.06+ox+ps*.4;

  const g=S.grade||GRADES[4];
  const k=clamp(S.overT*2.4,0,1), sc=3-2.2*k+(k===1?Math.sin(S.t*3)*.02:0);
  ctx.save();ctx.translate(GCX,255);ctx.rotate(-.12);ctx.scale(sc,sc);
  ctx.globalAlpha=k;
  ctx.strokeStyle=g.c;ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,0,56,0,7);ctx.stroke();
  ctx.fillStyle=g.c;ctx.font='bold 82px Arial';ctx.fillText(g.l,0,29);
  ctx.restore();
  if(k>=1){ctx.fillStyle=g.c;ctx.font='italic bold 26px Arial';ctx.fillText('"'+g.t+'"',GCX,350);}
  ctx.fillStyle='#f8fafc';ctx.font='bold 40px Arial';ctx.fillText(Math.round(S.score),GCX,405);
  ctx.fillStyle='#94a3b8';ctx.font='17px Arial';
  ctx.fillText('SAVES: '+S.saves+'   •   MATCHES: '+S.matchIdx+'   •   BEST: '+S.best,GCX,438);
  if(Math.round(S.score)>=S.best&&S.score>0){
    ctx.fillStyle='#facc15';ctx.font='bold 22px Arial';
    ctx.fillText('★ NEW BEST ★',GCX,472);
    if(Math.random()<.1)burst(GCX+rnd(-200,200),rnd(120,300),8,['#facc15','#fde047'],200);
  }
  if(S.overLock<=0&&Math.sin(S.t*4)>-.3){ctx.fillStyle='#4ade80';ctx.font='bold 26px Arial';ctx.fillText('CLICK TO PLAY AGAIN',GCX,530);}
}
function drawCursor(){
  if(S.mode==='play')return;
  ctx.strokeStyle='#22d3ee';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(PT.x,PT.y,9,0,7);ctx.stroke();
  ctx.fillStyle='#22d3ee';ctx.beginPath();ctx.arc(PT.x,PT.y,2.5,0,7);ctx.fill();
}

/* ---------- main loop: fixed substeps (survives throttled/hidden tabs & hitches) ---------- */
const SIM_H=1/60;
function simTick(h){update(h*S.ts+((S.mode!=='play')?h*(1-S.ts):0));}
let last=performance.now(),acc=0;
function step(now){
  let el=Math.min((now-last)/1000,1.2);last=now;
  acc+=el*(S.debugTs||1);
  let n=0;
  while(acc>=SIM_H&&n<240){simTick(SIM_H);acc-=SIM_H;n++;}
  if(n>=240)acc=0;
  draw();
}
function frame(now){requestAnimationFrame(frame);step(now);}
requestAnimationFrame(frame);
setInterval(()=>{if(document.hidden)step(performance.now());},33);

/* ---------- debug hooks ---------- */
window.__sk={
  info:()=>({mode:S.mode,sub:S.sub,gameMode:S.gameMode,match:S.matchIdx,round:S.R?S.R.round:0,place:S.royaleResult?S.royaleResult.place:0,duel:S.D?{stage:S.D.stage,my:S.D.myGoals,their:S.D.theirGoals,round:S.D.round,won:S.duelResult?S.duelResult.won:null}:0,score:Math.round(S.score),hp:S.hp,streak:S.streak,saves:S.saves,shot:S.shotIdx+'/'+S.shotsTotal,chaos:S.chaos,best:S.best}),
  start:()=>{if(S.mode==='title'||S.mode==='over'){S.overLock=0;startRun();}},
  royale:()=>{if(S.mode==='title'||S.mode==='over'){S.overLock=0;startRoyale();}},
  duel:()=>{if(S.mode==='title'||S.mode==='over'){S.overLock=0;startDuel();}},
  god:v=>{S.god=!!v;},
  autopick:v=>{S.autopick=!!v;},
  speed:v=>{S.debugTs=+v||1;},
  hurt:()=>{S.hp=1;},
  step:s=>{S.paused=false;let n=Math.floor((+s||1)/SIM_H);while(n-->0)simTick(SIM_H);draw();return window.__sk.info();},
};
</script>
